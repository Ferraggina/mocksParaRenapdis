worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    # Temp dirs writable por cualquier UID (requerido en OpenShift)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path        /tmp/proxy_temp;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        # Raíz → mock1 (punto de entrada por defecto)
        location = / {
            return 302 /mock1/;
        }

        # SPA rewrite: cualquier ruta bajo /mock* que no sea un archivo real
        # se sirve con el HTML de entrada correspondiente, y React Router
        # toma el control en el cliente.
        location /mock1 {
            try_files $uri /mock1.html;
        }

        location /mock2 {
            try_files $uri /mock2.html;
        }

        location /mock3 {
            try_files $uri /mock3.html;
        }

        # Assets con cache agresivo (Vite genera hashes en los nombres)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
